name: mizhi
description: "AI powered navigation for the visually impaired."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  tflite_flutter: ^0.12.1
  flutter_tts: ^3.8.5
  vibration: ^3.1.8
  cupertino_icons: ^1.0.8
  permission_handler: ^12.0.1
  image: ^4.1.3
  shared_preferences: ^2.2.2
  speech_to_text: ^7.0.0
  url_launcher: ^6.3.0
  firebase_core: ^2.27.0
  firebase_database: ^10.4.9
  geolocator: ^11.0.0
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
